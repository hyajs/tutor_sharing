name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: crpi-9nya4llb97sx949i.cn-hangzhou.personal.cr.aliyuncs.com
  BACKEND_IMAGE: crpi-9nya4llb97sx949i.cn-hangzhou.personal.cr.aliyuncs.com/hyajs/jiajiao-backend
  FRONTEND_IMAGE: crpi-9nya4llb97sx949i.cn-hangzhou.personal.cr.aliyuncs.com/hyajs/jiajiao-frontend
  TAG: ${{ github.sha }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} --username ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud Container Registry
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} --username ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Create nginx.conf on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            mkdir -p /root/projects/jiajiao/docker
            cat > /root/projects/jiajiao/docker/nginx.conf << 'NGINX_EOF'
upstream backend {
    server jiajiao-backend:8000;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend routes - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
NGINX_EOF
            echo "nginx.conf created"

      - name: Deploy containers on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: TAG
          script: |
            set -e
            export TAG=${{ env.TAG }}
            export REGISTRY=${{ env.REGISTRY }}
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            export FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}

            # Login to ACR
            echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY --username ${{ secrets.ACR_USERNAME }} --password-stdin

            # Create network
            docker network create jiajiao-net 2>/dev/null || true

            # Stop and remove old containers
            docker stop jiajiao-nginx jiajiao-frontend jiajiao-backend jiajiao-postgres jiajiao-redis 2>/dev/null || true
            docker rm jiajiao-nginx jiajiao-frontend jiajiao-backend jiajiao-postgres jiajiao-redis 2>/dev/null || true

            # Pull images
            echo "Pulling images..."
            docker pull $BACKEND_IMAGE:$TAG
            docker pull $FRONTEND_IMAGE:$TAG

            # Tag images
            docker tag $BACKEND_IMAGE:$TAG jiajiao-backend:latest
            docker tag $FRONTEND_IMAGE:$TAG jiajiao-frontend:latest

            # Pull postgres and redis
            docker pull postgres:15-alpine
            docker pull redis:7-alpine

            # Run PostgreSQL
            echo "Starting PostgreSQL..."
            docker run -d \
              --name jiajiao-postgres \
              --restart=always \
              --network jiajiao-net \
              -e POSTGRES_USER=jiajiao \
              -e POSTGRES_PASSWORD=jiajiao123 \
              -e POSTGRES_DB=jiajiao \
              -v postgres_data:/var/lib/postgresql/data \
              postgres:15-alpine

            # Run Redis
            echo "Starting Redis..."
            docker run -d \
              --name jiajiao-redis \
              --restart=always \
              --network jiajiao-net \
              redis:7-alpine

            # Run Backend
            echo "Starting Backend..."
            docker run -d \
              --name jiajiao-backend \
              --restart=always \
              --network jiajiao-net \
              -p 8001:8000 \
              -e DATABASE_URL=postgresql://jiajiao:jiajiao123@jiajiao-postgres:5432/jiajiao \
              -e REDIS_URL=redis://jiajiao-redis:6379/0 \
              -e SECRET_KEY=your-secret-key-change-in-production \
              -e JWT_SECRET_KEY=your-jwt-secret-key-change-in-production \
              jiajiao-backend:latest

            # Run Frontend
            echo "Starting Frontend..."
            docker run -d \
              --name jiajiao-frontend \
              --restart=always \
              --network jiajiao-net \
              jiajiao-frontend:latest

            # Run Nginx
            echo "Starting Nginx..."
            docker run -d \
              --name jiajiao-nginx \
              --restart=always \
              --network jiajiao-net \
              -p 81:80 \
              -v /root/projects/jiajiao/docker/nginx.conf:/etc/nginx/conf.d/default.conf \
              nginx:alpine

            # Show status
            echo ""
            echo "=== Deployment completed ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"