name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: crpi-9nya4llb97sx949i.cn-hangzhou.personal.cr.aliyuncs.com
  BACKEND_IMAGE: crpi-9nya4llb97sx949i.cn-hangzhou.personal.cr.aliyuncs.com/hyajs/jiajiao-backend
  FRONTEND_IMAGE: crpi-9nya4llb97sx949i.cn-hangzhou.personal.cr.aliyuncs.com/hyajs/jiajiao-frontend
  TAG: ${{ github.sha }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} --username ${{ secrets.ACR_USERNAME }} --password-stdin
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: true
          tags: "${{ env.BACKEND_IMAGE }}:${{ env.TAG }},${{ env.BACKEND_IMAGE }}:latest"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} --username ${{ secrets.ACR_USERNAME }} --password-stdin
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: true
          tags: "${{ env.FRONTEND_IMAGE }}:${{ env.TAG }},${{ env.FRONTEND_IMAGE }}:latest"

  build-base-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} --username ${{ secrets.ACR_USERNAME }} --password-stdin
      - name: Pull and push postgres
        run: |
          docker pull postgres:15-alpine
          docker tag postgres:15-alpine ${{ env.REGISTRY }}/hyajs/jiajiao-postgres:latest
          docker push ${{ env.REGISTRY }}/hyajs/jiajiao-postgres:latest
      - name: Pull and push redis
        run: |
          docker pull redis:7-alpine
          docker tag redis:7-alpine ${{ env.REGISTRY }}/hyajs/jiajiao-redis:latest
          docker push ${{ env.REGISTRY }}/hyajs/jiajiao-redis:latest
      - name: Pull and push nginx
        run: |
          docker pull nginx:alpine
          docker tag nginx:alpine ${{ env.REGISTRY }}/hyajs/jiajiao-nginx:latest
          docker push ${{ env.REGISTRY }}/hyajs/jiajiao-nginx:latest

  deploy:
    needs: [build-backend, build-frontend, build-base-images]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: TAG
          script: |
            set -e
            TAG=${{ env.TAG }}
            REGISTRY=${{ env.REGISTRY }}
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}
            POSTGRES_IMAGE=${{ env.REGISTRY }}/hyajs/jiajiao-postgres
            REDIS_IMAGE=${{ env.REGISTRY }}/hyajs/jiajiao-redis
            NGINX_IMAGE=${{ env.REGISTRY }}/hyajs/jiajiao-nginx

            echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY --username ${{ secrets.ACR_USERNAME }} --password-stdin
            docker network create jiajiao-net 2>/dev/null || true
            docker stop jiajiao-nginx jiajiao-frontend jiajiao-backend jiajiao-postgres jiajiao-redis 2>/dev/null || true
            docker rm jiajiao-nginx jiajiao-frontend jiajiao-backend jiajiao-postgres jiajiao-redis 2>/dev/null || true

            echo "Pulling images..."
            docker pull $BACKEND_IMAGE:$TAG
            docker pull $FRONTEND_IMAGE:$TAG
            docker pull $POSTGRES_IMAGE:latest
            docker pull $REDIS_IMAGE:latest
            docker pull $NGINX_IMAGE:latest

            docker tag $BACKEND_IMAGE:$TAG jiajiao-backend:latest
            docker tag $FRONTEND_IMAGE:$TAG jiajiao-frontend:latest
            docker tag $POSTGRES_IMAGE:latest postgres:15-alpine
            docker tag $REDIS_IMAGE:latest redis:7-alpine
            docker tag $NGINX_IMAGE:latest nginx:alpine

            echo "Starting containers..."
            docker run -d --name jiajiao-postgres --restart=always --network jiajiao-net -e POSTGRES_USER=jiajiao -e POSTGRES_PASSWORD=jiajiao123 -e POSTGRES_DB=jiajiao -v postgres_data:/var/lib/postgresql/data postgres:15-alpine
            docker run -d --name jiajiao-redis --restart=always --network jiajiao-net redis:7-alpine
            docker run -d --name jiajiao-backend --restart=always --network jiajiao-net -p 8001:8000 -e DATABASE_URL=postgresql://jiajiao:jiajiao123@jiajiao-postgres:5432/jiajiao -e REDIS_URL=redis://jiajiao-redis:6379/0 -e SECRET_KEY=prod-secret-key -e JWT_SECRET_KEY=prod-jwt-secret jiajiao-backend:latest

            echo "Waiting for backend to init DB..."
            sleep 15

            echo "Creating users..."
            docker exec jiajiao-backend python3 -c "$(echo  | base64 -d)"

            docker run -d --name jiajiao-frontend --restart=always --network jiajiao-net --expose 80 jiajiao-frontend:latest

            mkdir -p /root/projects/jiajiao/docker
            cat > /root/projects/jiajiao/docker/nginx.conf << 'NGINXCONF'
upstream backend { server jiajiao-backend:8000; }
upstream frontend { server jiajiao-frontend:80; }
server {
    listen 80;
    location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/ { proxy_pass http://backend/api/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
}
NGINXCONF

            docker run -d --name jiajiao-nginx --restart=always --network jiajiao-net -p 81:80 -v /root/projects/jiajiao/docker/nginx.conf:/etc/nginx/conf.d/default.conf nginx:alpine

            echo "=== Done ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"